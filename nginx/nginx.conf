upstream qrapp {
    server app:8000;
    keepalive 32;
}

# 10 requests/minute per IP on the generate API
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/m;
# 120 requests/minute per IP on general pages
limit_req_zone $binary_remote_addr zone=page_limit:10m rate=120r/m;

server {
    listen 80;
    server_name qrcode.chrisrmiller.com;

    server_tokens off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # CSP allows GA and inline styles (required by the UI)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com; img-src 'self' data: https://www.google-analytics.com; connect-src 'self' https://www.google-analytics.com https://analytics.google.com; style-src 'self' 'unsafe-inline'; font-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_types text/html text/css application/javascript image/svg+xml application/json;
    gzip_min_length 1024;

    # Max upload size (form data only, no large payloads needed)
    client_max_body_size 256k;

    # Hide sensitive paths
    location ~ /\. { deny all; }

    # Rate-limited generate endpoints
    location /api/generate {
        limit_req zone=api_limit burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://qrapp;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # All other routes
    location / {
        limit_req zone=page_limit burst=30 nodelay;

        proxy_pass http://qrapp;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }
}
