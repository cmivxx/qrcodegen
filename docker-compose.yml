services:
  app:
    build: .
    container_name: qrcode-app
    restart: unless-stopped
    ports:
      - "8086:8000"
    environment:
      - FLASK_ENV=production
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/generator')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
